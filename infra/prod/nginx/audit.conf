server {
    listen 80;
    listen [::]:80;
    server_name audit.wiseflownext.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name audit.wiseflownext.com;

    ssl_certificate /etc/letsencrypt/live/wiseflownext-wildcard/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wiseflownext-wildcard/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 100m;

    access_log /var/log/nginx/audit.wiseflownext.com.access.log;
    error_log /var/log/nginx/audit.wiseflownext.com.error.log;

    location /api/ {
        proxy_pass http://127.0.0.1:18104;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        client_max_body_size 50m;
    }

    location /health {
        proxy_pass http://127.0.0.1:18104;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://127.0.0.1:18104;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:18104;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /assets/ {
        root /var/www/make-audit;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        root /var/www/make-audit;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
